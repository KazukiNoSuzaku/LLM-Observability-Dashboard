name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          # Install lightweight subset — skip heavy optional deps for CI speed
          pip install \
            fastapi>=0.104.0 \
            uvicorn[standard]>=0.24.0 \
            sqlalchemy>=2.0.0 \
            aiosqlite>=0.19.0 \
            pydantic>=2.5.0 \
            pydantic-settings>=2.0.0 \
            anthropic>=0.26.0 \
            httpx>=0.25.0 \
            opentelemetry-api>=1.20.0 \
            opentelemetry-sdk>=1.20.0 \
            PyJWT>=2.8.0 \
            Authlib>=1.3.0 \
            itsdangerous>=2.1.0 \
            pytest>=7.4.0 \
            pytest-asyncio>=0.23.0 \
            anyio[trio]

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check llm_observability/ --select=E,F,W --ignore=E501 || true

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ANTHROPIC_API_KEY: "test-key"
          AUTH_ENABLED: "false"
          GUARDRAILS_ENABLED: "false"
          PHOENIX_ENABLED: "false"
          JUDGE_ENABLED: "false"
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_guardrails.py

      - name: Run guardrail unit tests (no heavy deps)
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ANTHROPIC_API_KEY: "test-key"
          AUTH_ENABLED: "false"
          GUARDRAILS_ENABLED: "false"
          PHOENIX_ENABLED: "false"
        run: |
          pytest tests/test_guardrails.py -v --tb=short -k "disabled or clean or log_rows"

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t llm-observability:ci .
