name: Release

on:
  push:
    tags:
      - "v*.*.*"   # trigger on version tags like v1.0.0, v2.1.3

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Run tests before releasing ─────────────────────────────────────────────
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi>=0.104.0 uvicorn[standard]>=0.24.0 \
            sqlalchemy>=2.0.0 aiosqlite>=0.19.0 \
            pydantic>=2.5.0 pydantic-settings>=2.0.0 \
            anthropic>=0.26.0 httpx>=0.25.0 \
            opentelemetry-api>=1.20.0 opentelemetry-sdk>=1.20.0 \
            PyJWT>=2.8.0 Authlib>=1.3.0 itsdangerous>=2.1.0 \
            pytest>=7.4.0 pytest-asyncio>=0.23.0 anyio[trio]
      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ANTHROPIC_API_KEY: "test-key"
          AUTH_ENABLED: "false"
          GUARDRAILS_ENABLED: "false"
          PHOENIX_ENABLED: "false"
          JUDGE_ENABLED: "false"
        run: pytest tests/ -v --tb=short --ignore=tests/test_guardrails.py

  # ── Build and push Docker image to GitHub Container Registry ──────────────
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release with source archives ─────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test, docker]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Python sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist/

      - name: Generate release notes
        id: notes
        run: |
          # Pull commit messages since the last tag for auto changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LLM Observability Dashboard ${{ github.ref_name }}"
          body: |
            ## What's Changed

            ${{ steps.notes.outputs.NOTES }}

            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ```

            ## Quick Start

            See [QUICKSTART.md](https://github.com/${{ github.repository }}/blob/main/QUICKSTART.md) for full setup instructions.
          files: dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
